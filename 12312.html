<!DOCTYPE html>
<html lang="vi">
<head>
  <title>Website cá nhân</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 3 -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

  <!-- CSS tự viết -->
  <style>
    body {
      background: #f5f7fa;
      font-family: Arial, sans-serif;
    }

    .profile {
      text-align: center;
      margin-bottom: 30px;
    }

    .profile img {
      width: 150px;
      border-radius: 50%;
      border: 4px solid #3498db;
    }

    .profile h3 {
      margin-top: 10px;
      font-weight: bold;
    }

    .form-box {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .btn-custom {
      background: #3498db;
      color: white;
      border: none;
    }

    .btn-custom:hover {
      background: #2980b9;
      color: white;
    }
  </style>
</head>

<body>

<div class="container" style="margin-top:50px; max-width:500px;">

  <!-- Thông tin cá nhân -->
  <div class="profile">
    <img src="Elon_Musk_(cropped).jpg" alt="avatar">
    <h3>Nguyễn</h3>
    <p>Đang học lập trình web 😎</p>
  </div>

  <!-- Form liên hệ -->
  <div class="form-box">
    <h2 class="text-center">Liên hệ</h2>

    <form>
      <div class="form-group">
        <label>Email:</label>
        <input type="email" class="form-control" placeholder="Nhập email">
      </div>

      <div class="form-group">
        <label>Mật khẩu:</label>
        <input type="password" class="form-control" placeholder="Nhập mật khẩu">
      </div>

      <div class="checkbox">
        <label><input type="checkbox"> Ghi nhớ tôi</label>
      </div>

      <button type="submit" class="btn btn-custom btn-block">Gửi</button>
    </form>
  </div>

</div>

</body>
</html>
