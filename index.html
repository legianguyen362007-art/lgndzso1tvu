<DOCTYPE html>
<html lang="=vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Nhập</title>
<style>
    body{
        background: #e5e5e5;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: 100vh;
        margin: 0;

    } 
    .login-box{
        width: 420px;
        background: white;
        padding: 30px;
        border-radius: 5px;
        box-shadow: 0 0 10px gray;
        text-align: center;
    }

    .logo-container {
            margin-bottom: 15px;
        }
        .logo-container img {
            max-width: 150px;
            height: auto;
            object-fit: contain;
        }
    
    h2{
        font-size: 22px;
        line-height: 1.5;
    }
    input{
        width: 95%;
        padding: 10px;
        margin-top: 10px;
        box-sizing: border-box;
    }
    
.row{
    margin-top: 15px;
    display: flex;
    align-items: center;
}
.btn{
        padding: 10px 20px;
        border: none;
        color: white;
        cursor: pointer;
        border-radius: 4px;
        font-weight: bold;
}
.blue{
    background: #0d6efd;
    width:100%;
    <margin-top:15px;

}
.red{
    background: #dc3545;
    width: 100%;
    margin-top: 10px;

}
.login{
    background: #0d63fd;
    width: 200px;
    border-radius: 1px;
    border: 1px solid #ddd;

    
}



a{
    text-decoration: none;
    color:#0d6efd;
    display: inline-block;
    margin-top: 15px;
}
</style>
</head>
<body>
<div class="login-box">
<div class="logo-container">
        <img src="c:\Users\Hoc vien\Downloads\TVU-RGB.png" alt="Logo">
    </div>
    <h2>
        PHẦN MỀM TIN HỌC<br>
        ĐÁNH GIÁ KẾT QUẢ RÈN LUYỆN<br>
        CHO SINH VIÊN
    </h2>
    
    <input type="email" placeholder="Email">

    <input type="password" placeholder="Mật khẩu">

    <div class="row">
        <input type="checkbox" style="width:auto;">
        Nhớ mật khẩu
        <button class="btn login">Đăng nhập</button>
    </div>

    <button class="btn blue">
        Sinh viên (Đăng nhập bằng Email Microsoft)
    </button>

    <button class="btn red">
        Giảng viên (Đăng nhập bằng Email TVU)
    </button>

    <br><br>

    <a href="#">Quên mật khẩu?</a>

</div>

</body>
</html>
